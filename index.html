<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ituze IDE - Code Editor & Live Preview</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='50' font-size='50' text-anchor='middle' dominant-baseline='middle' fill='%232f81f7'>&lt;/&gt;</text></svg>" type="image/svg+xml">
    
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/editor.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/animations.css">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4RPPG857F8"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date);gtag('config','G-4RPPG857F8')</script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.53.0/min/vs/loader.min.js"></script>
</head>
<body>
    <!-- Header -->
    <header id="header" class="header">
        <div class="header-left">
            <div class="logo">
                <i data-lucide="code-2"></i>
                <span>Ituze IDE</span>
            </div>
        </div>
        
        <div class="header-center">
            <div class="search-box">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="searchInput" placeholder="Search files..." class="search-input">
            </div>
        </div>
        
        <div class="header-right">
            <button class="btn btn-icon" id="btnExport" title="Export Project">
                <i data-lucide="download"></i>
            </button>
            <button class="btn btn-icon" id="btnImport" title="Import Project">
                <i data-lucide="upload"></i>
            </button>
            <button class="btn btn-icon" id="btnSettings" title="Settings">
                <i data-lucide="settings"></i>
            </button>
            <button class="btn btn-primary" id="btnRun">
                <i data-lucide="play"></i>
                <span>Run</span>
            </button>
        </div>
    </header>

    <!-- Main Layout -->
    <main id="main" class="main-layout">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h3>Explorer</h3>
                <div class="sidebar-actions">
                    <button class="btn btn-icon-sm" id="btnNewFile" title="New File">
                        <i data-lucide="file-plus"></i>
                    </button>
                    <button class="btn btn-icon-sm" id="btnNewFolder" title="New Folder">
                        <i data-lucide="folder-plus"></i>
                    </button>
                </div>
            </div>
            
            <div id="fileTree" class="file-tree">
                <!-- Populated by JS -->
            </div>
        </aside>

        <!-- Editor Container -->
        <div id="editorContainer" class="editor-container">
            <!-- Tab Bar -->
            <div id="tabBar" class="tab-bar">
                <!-- Populated by JS -->
            </div>
            
            <!-- Monaco Editor -->
            <div id="monacoEditor" class="monaco-container"></div>
        </div>

        <!-- Resizer -->
        <div id="resizer" class="resizer"></div>

        <!-- Preview Section -->
        <div id="previewSection" class="preview-section">
            <div class="preview-toolbar">
                <div class="preview-controls">
                    <button class="btn btn-icon-sm" id="btnDesktop" title="Desktop">
                        <i data-lucide="monitor"></i>
                    </button>
                    <button class="btn btn-icon-sm" id="btnTablet" title="Tablet">
                        <i data-lucide="tablet"></i>
                    </button>
                    <button class="btn btn-icon-sm" id="btnMobile" title="Mobile">
                        <i data-lucide="smartphone"></i>
                    </button>
                </div>
                <div class="preview-status">
                    <div class="status-indicator" id="autoRunStatus"></div>
                    <span id="autoRunText">Auto-run: ON</span>
                </div>
            </div>
            
            <iframe id="previewFrame" class="preview-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-pointer-lock allow-popups allow-presentation"></iframe>
        </div>
    </main>

    <!-- Context Menu -->
    <div id="contextMenu" class="context-menu">
        <div class="menu-item" data-action="new-file">
            <i data-lucide="file-plus"></i>
            <span>New File</span>
        </div>
        <div class="menu-item" data-action="new-folder">
            <i data-lucide="folder-plus"></i>
            <span>New Folder</span>
        </div>
        <div class="menu-divider"></div>
        <div class="menu-item" data-action="rename">
            <i data-lucide="edit-2"></i>
            <span>Rename</span>
        </div>
        <div class="menu-item danger" data-action="delete">
            <i data-lucide="trash-2"></i>
            <span>Delete</span>
        </div>
    </div>

    <!-- Modal Container -->
    <div id="modalContainer" class="modal-container"></div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Settings Panel -->
    <div id="settingsPanel" class="settings-panel">
        <div class="settings-header">
            <h2>Settings</h2>
            <button class="btn btn-icon" id="btnCloseSettings">
                <i data-lucide="x"></i>
            </button>
        </div>
        
        <div class="settings-content">
            <div class="setting-group">
                <label class="setting-label">Editor Theme</label>
                <select id="settingTheme" class="select">
                    <option value="vs-dark">Dark (GitHub)</option>
                    <option value="vs">Light</option>
                    <option value="hc-black">High Contrast</option>
                </select>
            </div>

            <div class="setting-group">
                <label class="setting-label">Font Family</label>
                <select id="settingFont" class="select">
                    <option value="'Fira Code', 'JetBrains Mono', monospace">Fira Code</option>
                    <option value="Consolas, monospace">Consolas</option>
                    <option value="'Courier New', monospace">Courier New</option>
                </select>
            </div>

            <div class="setting-group">
                <label class="setting-label">Font Size (12-18px)</label>
                <div class="input-group">
                    <input type="range" id="settingFontSize" min="12" max="18" value="14" class="slider">
                    <span id="fontSizeValue">14px</span>
                </div>
            </div>

            <div class="setting-group">
                <label class="setting-label">Line Height</label>
                <div class="input-group">
                    <input type="range" id="settingLineHeight" min="1.1" max="2.5" step="0.1" value="1.5" class="slider">
                    <span id="lineHeightValue">1.5</span>
                </div>
            </div>

            <div class="setting-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="settingLineNumbers" checked>
                    Show Line Numbers
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="settingWordWrap" checked>
                    Word Wrap
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="settingAutoRun" checked>
                    Auto-Run Code
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="settingMinimap">
                    Show Minimap
                </label>
            </div>

            <div class="setting-group">
                <label class="setting-label">Base URL (for assets)</label>
                <input type="text" id="settingBaseUrl" placeholder="https://example.com/" class="input">
            </div>

            <div class="setting-group">
                <button class="btn btn-secondary" id="btnClearStorage">Clear All Data</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/filesystem.js"></script>
    <script src="js/editor.js"></script>
    <script src="js/preview.js"></script>
    <script src="js/export-import.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/shortcuts.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
